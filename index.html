<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiipLifeStory</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div id="landing-screen" class="full-bg">
        <div class="welcome-card">
            <h1 class="brand-logo">BiipLifeStory</h1>
            <p class="greeting-text">Rumah bagi setiap fragmen kisahmu.</p>
            
            <div class="form-container">
                <input type="text" id="user-input" placeholder="Nama Penulis / Email" class="input-modern">
                <input type="password" id="pass-input" placeholder="Kunci Rahasia" class="input-modern">
                <button class="btn-glow" onclick="prosesLogin()">Masuk & Mulai Menulis</button>
                <p style="font-size: 11px; margin-top: 15px; color: #666;">Belum memiliki akses? <span style="color: #2d5a27; cursor:pointer; font-weight:bold;">Daftar Sekarang</span></p>
            </div>
        </div>
    </div>

    <div id="main-dashboard" class="dashboard-hidden">
        <div class="dash-content">
            <h1 class="brand-logo-small">BiipLifeStory</h1>
            <p class="sub-title">Pilih kanvas untuk jiwamu</p>
            
            <div class="theme-grid">
                <div class="theme-card botanical" onclick="bukaDiary('Botanical')">
                    <div class="card-overlay"><span>🌿 Botanical</span></div>
                </div>
                <div class="theme-card celestial" onclick="bukaDiary('Celestial')">
                    <div class="card-overlay"><span>✨ Celestial</span></div>
                </div>
                <div class="theme-card archive" onclick="bukaDiary('Archive')">
                    <div class="card-overlay"><span>📜 Archive</span></div>
                </div>
                <div class="theme-card watercolor" onclick="bukaDiary('Watercolor')">
                    <div class="card-overlay"><span>🎨 Watercolor</span></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function prosesLogin() {
            const user = document.getElementById('user-input').value;
            const pass = document.getElementById('pass-input').value;

            if(user === "" || pass === "") {
                alert("Harap masukkan nama dan kunci rahasia Anda.");
            } else {
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('authorName', user);
                
                document.getElementById('landing-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('landing-screen').style.display = 'none';
                    document.getElementById('main-dashboard').classList.remove('dashboard-hidden');
                }, 500);
            }
        }

        function bukaDiary(tema) {
            if(localStorage.getItem('isLoggedIn') === 'true') {
                localStorage.setItem('temaDipilih', tema);
                window.location.href = 'tulis.html';
            } else {
                alert("Silakan masuk terlebih dahulu untuk mengakses lembaran ini.");
            }
        }
    </script>
</body>
</html>
