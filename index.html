<script>
    // Sistem Login & Daftar Sederhana
    function prosesLogin() {
        const user = document.getElementById('user-input').value;
        const pass = document.getElementById('pass-input').value;

        // Simulasi database lokal
        let storedPass = localStorage.getItem('user_pass_' + user);

        if(!storedPass) {
            // Jika user belum ada, kita daftarkan otomatis (untuk pertama kali)
            localStorage.setItem('user_pass_' + user, pass);
            alert("Akun baru berhasil didaftarkan dengan sandi tersebut!");
            storedPass = pass;
        }

        if(pass === storedPass) {
            localStorage.setItem('isLoggedIn', 'true');
            localStorage.setItem('activeUser', user);
            
            document.getElementById('landing-screen').style.display = 'none';
            document.getElementById('main-dashboard').classList.remove('dashboard-hidden');
        } else {
            alert("Sandi salah! Akses ditolak.");
        }
    }
</script>
