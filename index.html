<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiipLifeStory</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="hal-login" class="login-screen">
        <div class="glass-card">
            <h1 class="brand-title">BiipLifeStory</h1>
            <p style="color:#666; margin-bottom:20px;">Rumah bagi setiap fragmen kisahmu.</p>
            <input type="text" id="user-nama" placeholder="Nama Penulis" class="input-field">
            <input type="password" id="user-sandi" placeholder="Kunci Rahasia (Sandi)" class="input-field">
            <button onclick="cekLogin()" class="btn-login">Masuk & Mulai Menulis</button>
        </div>
    </div>

    <div id="hal-dash" class="hidden dashboard">
        <h1 class="brand-title" style="font-size:2rem;">Pilih Kanvas Jiwamu</h1>
        <div class="theme-grid">
            <div class="card botanical" onclick="mulai('botanical')">🌿 Botanical</div>
            <div class="card celestial" onclick="mulai('celestial')">✨ Celestial</div>
            <div class="card archive" onclick="mulai('archive')">📜 Archive</div>
            <div class="card watercolor" onclick="mulai('watercolor')">🎨 Watercolor</div>
        </div>
    </div>

    <script>
        function cekLogin() {
            const u = document.getElementById('user-nama').value;
            const s = document.getElementById('user-sandi').value;
            
            if(u === "" || s === "") {
                alert("Nama dan Sandi wajib diisi!");
                return;
            }

            // MENGUNCI SANDI: Hanya sandi pertama yang bisa masuk seterusnya
            if(!localStorage.getItem('sandi_' + u)) {
                localStorage.setItem('sandi_' + u, s);
            }

            if(s === localStorage.getItem('sandi_' + u)) {
                document.getElementById('hal-login').classList.add('hidden');
                document.getElementById('hal-dash').classList.remove('hidden');
            } else {
                alert("Sandi salah! Akses ditolak.");
            }
        }

        function mulai(t) {
            localStorage.setItem('tema_pilihan', t);
            window.location.href = 'tulis.html';
        }
    </script>
</body>
</html>
