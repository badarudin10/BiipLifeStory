<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiipLifeStory - Profesional</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="screen-login" class="login-screen">
        <div class="glass-card">
            <h1 class="brand-title">BiipLifeStory</h1>
            <p style="color:#777; margin-bottom:30px;">Rumah bagi setiap fragmen kisahmu.</p>
            <input type="text" id="reg-user" placeholder="Nama Penulis" class="input-field">
            <input type="password" id="reg-pass" placeholder="Kunci Rahasia (Sandi)" class="input-field">
            <button onclick="simpanDanMasuk()" class="btn-login">Masuk & Mulai Menulis</button>
        </div>
    </div>

    <div id="screen-dash" class="hidden dashboard">
        <h1 class="brand-title" style="font-size: 2.2rem;">Pilih Kanvas Jiwamu</h1>
        <div class="theme-grid">
            <div class="card botanical" onclick="bukaKanvas('botanical')">🌿 Botanical</div>
            <div class="card celestial" onclick="pilihLain()">✨ Celestial</div>
            <div class="card archive" onclick="pilihLain()">📜 Archive</div>
            <div class="card watercolor" onclick="pilihLain()">🎨 Watercolor</div>
        </div>
    </div>

    <script>
        function simpanDanMasuk() {
            const u = document.getElementById('reg-user').value;
            const p = document.getElementById('reg-pass').value;
            if(u && p) {
                // Kunci akun ke memori perangkat
                localStorage.setItem('auth_user', u);
                localStorage.setItem('auth_pass', p);
                
                document.getElementById('screen-login').classList.add('hidden');
                document.getElementById('screen-dash').classList.remove('hidden');
            } else { alert("Lengkapi Nama dan Sandi!"); }
        }

        function bukaKanvas(t) {
            localStorage.setItem('tema_aktif', t);
            window.location.href = 'tulis.html';
        }
        function pilihLain() { alert("Tema ini sedang dalam penyempurnaan visual."); }
    </script>
</body>
</html>
