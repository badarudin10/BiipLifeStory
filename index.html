<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>BiipLifeStory Professional</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>

    <div class="vibe-layer">
        <div id="vibe-left" class="vibe-img"></div>
        <div id="vibe-right" class="vibe-img"></div>
    </div>

    <div id="view-login" style="height:100vh; display:flex; align-items:center; justify-content:center;">
        <div style="background:white; padding:50px; border-radius:40px; text-align:center; box-shadow:0 20px 50px rgba(0,0,0,0.05);">
            <h1 style="font-family:'Crimson Pro'; font-size:3rem; margin-bottom:20px;">BiipLifeStory</h1>
            <input type="text" id="author-name" placeholder="Siapa nama Anda?" style="width:100%; padding:15px; border-radius:15px; border:1px solid #eee; margin-bottom:20px;">
            <button onclick="doLogin()" class="btn-dock" style="background:#1a1a1a; color:white; width:100%;">Masuk & Menulis</button>
        </div>
    </div>

    <div id="view-dash" class="hidden container-dash">
        <h2 style="font-family:'Crimson Pro'; font-size:2.5rem; margin-bottom:10px;">Halo, <span id="user-display"></span></h2>
        <p style="color:#888;">Pilih atmosfer untuk mahakarya Anda:</p>
        
        <div class="grid-themes">
            <div class="theme-card botanical" onclick="bukaEditor('botanical')"><h3>Botanical</h3><p>Kebijaksanaan</p></div>
            <div class="theme-card celestial" onclick="bukaEditor('celestial')"><h3>Celestial</h3><p>Imajinasi</p></div>
            <div class="theme-card archive" onclick="bukaEditor('archive')"><h3>Archive</h3><p>Keabadian</p></div>
            <div class="theme-card watercolor" onclick="bukaEditor('watercolor')"><h3>Watercolor</h3><p>Emosi</p></div>
        </div>

        <div id="arsip-container"></div>
    </div>

    <div id="view-editor" class="hidden write-view">
        <div id="pdf-area" class="paper-inner">
            <input type="text" id="write-title" class="editor-title" placeholder="Judul Mahakarya...">
            <textarea id="write-body" class="editor-body" placeholder="Biarkan kata mengalir..."></textarea>
        </div>

        <div class="dock">
            <button onclick="simpanLokal()" class="btn-dock" style="background:#1a1a1a; color:white;">Simpan</button>
            <button onclick="exportPDF()" class="btn-dock" style="background:#ad1457; color:white;">Unduh PDF</button>
            <button onclick="shareWA()" class="btn-dock" style="background:#25d366; color:white;">Kirim ke WA</button>
            <button onclick="keHome()" class="btn-dock" style="background:transparent; border:1px solid #ccc;">Kembali</button>
        </div>
    </div>

    <script>
        function doLogin() {
            const n = document.getElementById('author-name').value;
            if(n) {
                localStorage.setItem('active_penulis', n);
                document.getElementById('user-display').innerText = n;
                tampilHalaman('view-dash');
            }
        }

        function tampilHalaman(id) {
            document.querySelectorAll('body > div:not(.vibe-layer)').forEach(d => d.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function bukaEditor(vibe) {
            tampilHalaman('view-editor');
            const left = document.getElementById('vibe-left');
            const right = document.getElementById('vibe-right');
            
            // ASSET VISUAL ORNAMEN (Sisi Kertas)
            const assets = {
                'botanical': 'url("https://www.transparentpng.com/download/leaves/green-leaves-png-images-12.png")',
                'celestial': 'url("https://www.transparentpng.com/download/star/gold-star-transparent-background-21.png")',
                'archive': 'url("https://www.transparentpng.com/download/book/old-book-transparent-background-12.png")',
                'watercolor': 'url("https://www.transparentpng.com/download/watercolor/watercolor-splash-transparent-background-5.png")'
            };
            left.style.backgroundImage = assets[vibe];
            right.style.backgroundImage = assets[vibe];
            
            document.getElementById('write-title').value = "";
            document.getElementById('write-body').value = "";
        }

        function exportPDF() {
            const element = document.getElementById('pdf-area');
            const judul = document.getElementById('write-title').value || "Mahakarya";
            const opt = {
                margin: 0.7,
                filename: judul + '.pdf',
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(element).save();
        }

        function shareWA() {
            const t = document.getElementById('write-title').value;
            alert("Silakan klik 'Unduh PDF' terlebih dahulu, lalu lampirkan file tersebut ke WhatsApp agar format tulisan Anda tetap indah.");
            window.open(`https://wa.me/?text=Halo, baca karya saya: ${t}`, '_blank');
        }

        function keHome() {
            document.getElementById('vibe-left').style.backgroundImage = 'none';
            document.getElementById('vibe-right').style.backgroundImage = 'none';
            tampilHalaman('view-dash');
        }
    </script>
</body>
</html>
