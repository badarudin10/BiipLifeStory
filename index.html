<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Biiplive - Profesional Video Platform</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        
        <video id="biiplive-player" loop playsinline>
            <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
            Browser Anda tidak mendukung video.
        </video>
        
        <div class="ui-overlay">
            
            <div class="side-bar">
                <div class="action-btn" id="like-btn">
                    <span class="icon">🤍</span>
                    <span class="count">1.2k</span>
                </div>
                <div class="action-btn">
                    <span class="icon">💬</span>
                    <span class="count">45</span>
                </div>
                <div class="action-btn">
                    <span class="icon">🔄</span>
                    <span class="count">Share</span>
                </div>
            </div>

            <div class="bottom-info">
                <div class="user-profile">
                    <img src="https://via.placeholder.com/40" alt="Avatar" class="avatar">
                    <h3 class="username">@biip_creator</h3>
                    <button class="follow-btn">Ikuti</button>
                </div>
                <p class="caption">Mencoba fitur profesional Biiplive dengan tema Hijau Terang! 🔥 #BiiplivePro #Coding</p>
                <div class="music-info">
                    <span class="music-icon">🎵</span>
                    <div class="music-text-container">
                        <span class="music-text">Suara Asli - Biiplive Creator Studio</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="bottom-nav">
            <span class="nav-item active">🏠</span>
            <span class="nav-item">🔍</span>
            <div class="nav-item upload-container">
                <span class="upload-btn">+</span>
            </div>
            <span class="nav-item">💬</span>
            <a href="login.html" class="nav-item">👤</a>

        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const video = document.getElementById('biiplive-player');
            const likeBtn = document.getElementById('like-btn');
            const uiOverlay = document.querySelector('.ui-overlay');
            const likeIcon = likeBtn.querySelector('.icon');
            const likeCount = likeBtn.querySelector('.count');
            
            // Variabel Status
            let liked = false;
            let currentLikes = 1234; // Simulasi jumlah like awal

            // 1. Interaksi Klik Video (Play/Pause)
            uiOverlay.addEventListener('click', (e) => {
                // Pastikan yang diklik bukan tombol interaksi
                if (!e.target.closest('.action-btn')) {
                    if (video.paused) {
                        video.play();
                    } else {
                        video.pause();
                    }
                }
            });

            // 2. Interaksi Tombol Like
            likeBtn.addEventListener('click', () => {
                liked = !liked;
                if (liked) {
                    likeIcon.innerHTML = '❤️'; // Hati merah
                    likeIcon.style.color = '#ff3b30';
                    currentLikes++;
                } else {
                    likeIcon.innerHTML = '🤍'; // Hati putih
                    likeIcon.style.color = 'white';
                    currentLikes--;
                }
                // Update teks jumlah like (format sederhana)
                likeCount.innerText = (currentLikes / 1000).toFixed(1) + 'k';
            });
            
            // Mencoba Autoplay (banyak browser melarang autoplay muted otomatis)
            // Jadi video mungkin butuh klik pertama untuk jalan.
            video.muted = true; // Wajib muted untuk autoplay
            video.play().catch(error => {
                console.log("Autoplay dilarang browser, butuh interaksi user.");
            });
        });
    </script>
</body>
</html>
