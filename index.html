<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiipLifeStory</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="view-login" class="hero-login">
        <div class="glass-card">
            <h1 class="brand-title">BiipLifeStory</h1>
            <input type="text" id="penulis" placeholder="Nama Penulis" class="input-field">
            <input type="password" id="kunci" placeholder="Sandi Rahasia" class="input-field">
            <button onclick="masuk()" class="btn-super">Buka Lembaran Baru</button>
        </div>
    </div>

    <div id="view-dash" class="hidden dashboard">
        <h2 class="brand-title" style="font-size:2rem;">Selamat Datang Kembali, <span id="nama-user"></span></h2>
        
        <div class="theme-container">
            <div class="theme-card botanical" onclick="pilihTema('botanical')">
                <h3>Botanical</h3><p>Kebijaksanaan</p>
            </div>
            <div class="theme-card celestial" onclick="pilihTema('celestial')">
                <h3>Celestial</h3><p>Imajinasi</p>
            </div>
        </div>

        <div class="library-section">
            <h3>Arsip Karya Publik</h3>
            <div id="list-karya"></div>
        </div>
    </div>

    <script>
        function masuk() {
            const p = document.getElementById('penulis').value;
            if(p) {
                localStorage.setItem('user_aktif', p);
                document.getElementById('nama-user').innerText = p;
                document.getElementById('view-login').classList.add('hidden');
                document.getElementById('view-dash').classList.remove('hidden');
                muatKarya();
            }
        }

        function muatKarya() {
            const container = document.getElementById('list-karya');
            const data = JSON.parse(localStorage.getItem('biip_stories') || "[]");
            const user = localStorage.getItem('user_aktif');
            const milikSaya = data.filter(s => s.penulis === user);

            if(milikSaya.length === 0) {
                container.innerHTML = "<p>Belum ada karya.</p>";
                return;
            }

            container.innerHTML = milikSaya.map(s => `
                <div class="story-item">
                    <div><b>${s.judul}</b><br><small>${s.tanggal}</small></div>
                </div>
            `).join('');
        }

        function pilihTema(t) {
            localStorage.setItem('chosen_vibe', t);
            window.location.href = 'tulis.html';
        }
    </script>
</body>
</html>
