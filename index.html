<div class="hero-container">
    <div class="card-auth" id="auth-box">
        <h1 style="color: #00796b;">BiipLifeStory</h1>
        <p id="welcome-msg">Tuangkan kisah kreatifmu di sini.</p>
        
        <input type="text" id="user-name" placeholder="Nama Penulis" class="input-style">
        <input type="password" id="user-pass" placeholder="Buat Sandi" class="input-style">
        
        <button class="btn-primary" onclick="handleAuth()" id="auth-btn">Daftar Akun</button>
        <p id="switch-auth" onclick="toggleAuth()" style="font-size: 12px; cursor: pointer; color: blue; margin-top: 15px;">Sudah punya akun? Masuk</p>
    </div>

    <div id="main-dashboard" style="display:none; width: 100%; max-width: 500px;">
        <h2 style="text-align: center;">Pilih Tema Diary</h2>
        <div class="theme-container">
            <div class="theme-item" onclick="bukaDiary('Dreamy')" style="background-image: url('https://img.freepik.com/free-photo/blue-watercolor-texture-background_1083-172.jpg')">✨ Dreamy</div>
            <div class="theme-item" onclick="bukaDiary('Vintage')" style="background-image: url('https://img.freepik.com/free-photo/old-paper-texture_1194-5416.jpg')">📜 Vintage</div>
            <div class="theme-item" onclick="bukaDiary('Floral')" style="background-image: url('https://img.freepik.com/free-photo/pink-flowers-background_1253-33.jpg')">🌸 Floral</div>
            <div class="theme-item" onclick="bukaDiary('Minimalis')" style="background-image: url('https://img.freepik.com/free-photo/white-paper-texture_1194-5998.jpg')">☁️ Minimalis</div>
        </div>
    </div>
</div>

<script>
    let isRegistered = false;

    function toggleAuth() {
        isRegistered = !isRegistered;
        document.getElementById('auth-btn').innerText = isRegistered ? 'Masuk' : 'Daftar Akun';
        document.getElementById('welcome-msg').innerText = isRegistered ? 'Selamat Datang Kembali!' : 'Tuangkan kisah kreatifmu di sini.';
        document.getElementById('switch-auth').innerText = isRegistered ? 'Belum punya akun? Daftar' : 'Sudah punya akun? Masuk';
    }

    function handleAuth() {
        // Logika sederhana untuk simulasi login
        document.getElementById('auth-box').style.display = 'none';
        document.getElementById('main-dashboard').style.display = 'block';
    }

    function bukaDiary(tema) {
        localStorage.setItem('temaDipilih', tema);
        window.location.href = 'tulis.html';
    }
</script>
