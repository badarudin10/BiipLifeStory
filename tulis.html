<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="writing-area">
        <input type="text" id="judul-kisah" placeholder="Judul Kisahmu...">
        <textarea id="isi-kisah" placeholder="Tuliskan jiwamu di sini..."></textarea>
        
        <div class="action-bar">
            <button onclick="alert('Tersimpan')" class="btn-save" style="background:#333;">Simpan Pribadi</button>
            <button onclick="alert('Publik')" class="btn-save" style="background:#2d5a27;">Simpan Publik</button>
            <button onclick="window.print()" class="btn-save" style="background:#d4af37;">Cetak (Print) 🖨️</button>
        </div>
    </div>
</body>
</html>
