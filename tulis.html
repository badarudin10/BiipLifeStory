<script>
    // Mengambil tema yang dipilih dari dashboard
    const currentTheme = localStorage.getItem('selectedTheme');
    if(currentTheme === 'Sunset') {
        document.body.style.background = "#fff5f0";
    } else if(currentTheme === 'Ocean') {
        document.body.style.background = "#f0faff";
    }

    function handleImage(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = document.createElement('img');
                img.src = e.target.result;
                img.style.width = '100%';
                img.style.borderRadius = '15px';
                img.style.marginTop = '10px';
                document.querySelector('.writing-container').insertBefore(img, document.getElementById('story-input'));
            }
            reader.readAsDataURL(input.files[0]);
        }
    }
</script>

<label class="image-upload">
    <input type="file" onchange="handleImage(this)" style="display:none">
    📷 Tambah Gambar Kisahmu
</label>
