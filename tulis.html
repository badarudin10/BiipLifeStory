<style>
    .paper-sheet {
        background: white;
        background-image: url('https://www.transparenttextures.com/patterns/lined-paper.png'); /* Pola garis buku */
        min-height: 90vh;
        margin: 15px;
        padding: 30px;
        border-radius: 5px;
        box-shadow: 2px 2px 10px rgba(0,0,0,0.1);
    }
    .btn-group-save { display: flex; gap: 10px; margin-top: 20px; }
    .btn-save-private { background: #555; color: white; border: none; padding: 10px; border-radius: 5px; }
    .btn-save-public { background: #00796b; color: white; border: none; padding: 10px; border-radius: 5px; }
</style>

<div class="paper-sheet" id="diary-page">
    <button onclick="history.back()">⬅ Kembali</button>
    <h2 id="judul-tema">Tema: Minimalis</h2>
    
    <textarea id="isi-cerita" placeholder="Tuliskan kisah kreatifmu hari ini..." style="width: 100%; border: none; background: transparent; font-size: 18px; outline: none;"></textarea>

    <div class="btn-group-save">
        <button class="btn-save-private" onclick="alert('Tersimpan di Diary Pribadi🔒')">Simpan Pribadi</button>
        <button class="btn-save-public" onclick="alert('Kisahmu terbit untuk dunia! 🌍')">Simpan untuk Publik</button>
    </div>
</div>

<script>
    const tema = localStorage.getItem('temaDipilih');
    document.getElementById('judul-tema').innerText = "Lembaran " + tema;
    
    // Memberikan sentuhan gambar sesuai tema
    const page = document.getElementById('diary-page');
    if(tema === 'Vintage') page.style.backgroundColor = '#f4e4bc';
    if(tema === 'Floral') page.style.borderTop = '10px solid pink';
</script>
