<script>
    const vibe = localStorage.getItem('chosen_vibe') || 'botanical';
    document.getElementById('paper').classList.add('canvas-' + vibe);

    // Jika membuka karya lama
    if(localStorage.getItem('edit_judul')) {
        document.getElementById('judul-naskah').value = localStorage.getItem('edit_judul');
        document.getElementById('isi-naskah').value = localStorage.getItem('edit_isi');
    }

    function simpanPublik() {
        const j = document.getElementById('judul-naskah').value;
        const i = document.getElementById('isi-naskah').value;
        const penulis = localStorage.getItem('user_aktif');

        if(!j || !i) { alert("Judul dan Isi tidak boleh kosong!"); return; }

        let database = JSON.parse(localStorage.getItem('biip_stories') || "[]");
        
        const karyaBaru = {
            penulis: penulis,
            judul: j,
            isi: i,
            vibe: vibe,
            tanggal: new Date().toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' })
        };

        database.push(karyaBaru);
        localStorage.setItem('biip_stories', JSON.stringify(database));
        
        alert("Karya Anda telah abadi di Arsip Publik!");
        window.location.href = 'index.html';
    }
</script>
