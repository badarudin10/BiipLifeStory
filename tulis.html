<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menulis Kisah - BiipLifeStory</title>
    <link rel="stylesheet" href="style.css">
    <style>
        #paper {
            background: white;
            min-height: 80vh;
            margin: 20px;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        #story-editor {
            width: 100%;
            height: 300px;
            border: none;
            outline: none;
            font-size: 1.1rem;
            resize: none;
        }
        .img-preview { width: 100%; border-radius: 10px; margin-bottom: 15px; display: none; }
    </style>
</head>
<body id="write-body">

    <div id="paper">
        <button onclick="window.location.href='index.html'" style="border:none; background:none; cursor:pointer;">⬅ Kembali</button>
        <h2 id="theme-title" style="color:var(--dark);">Tulis Kisahmu</h2>
        
        <img id="preview" class="img-preview">

        <textarea id="story-editor" placeholder="Tuangkan kreatifitasmu di sini..."></textarea>
        
        <div class="actions" style="margin-top:20px;">
            <label style="background:#eee; padding:10px; border-radius:10px; cursor:pointer;">
                📷 Tambah Gambar
                <input type="file" id="img-input" style="display:none;" onchange="previewImg(this)">
            </label>
            <button class="btn-main" style="float:right;" onclick="alert('Kisah Tersimpan!')">Simpan</button>
        </div>
    </div>

    <script>
        // Mengatur tema warna secara otomatis
        const theme = localStorage.getItem('selectedTheme');
        const body = document.getElementById('write-body');
        if(theme === 'Nature') body.style.background = '#e8f5e9';
        if(theme === 'Sunset') body.style.background = '#fff3e0';
        if(theme === 'Ocean') body.style.background = '#e1f5fe';

        function previewImg(input) {
            const preview = document.getElementById('preview');
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = function(e) {
                preview.src = e.target.result;
                preview.style.display = 'block';
            }
            reader.readAsDataURL(file);
        }
    </script>
</body>
</html>
