<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menulis Kisah - BiipLifeStory</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .art-paper {
            background: white; min-height: 90vh; margin: 20px; border-radius: 10px;
            padding: 50px; position: relative; box-shadow: 0 5px 25px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        /* Pernak-pernik tema */
        .decor-top { position: absolute; top: 0; right: 0; width: 150px; opacity: 0.7; pointer-events: none; }
        .decor-bottom { position: absolute; bottom: 0; left: 0; width: 150px; opacity: 0.7; pointer-events: none; }
        
        #story-input {
            width: 100%; height: 500px; border: none; outline: none;
            font-size: 1.2rem; font-family: 'Playfair Display', serif;
            line-height: 1.8; background: transparent;
        }

        .action-bar { display: flex; gap: 10px; margin-top: 20px; }
        .btn-pribadi { background: #444; color: white; padding: 12px; border: none; border-radius: 5px; cursor: pointer; }
        .btn-publik { background: #2d5a27; color: white; padding: 12px; border: none; border-radius: 5px; cursor: pointer; }
        .btn-print { background: #d4af37; color: white; padding: 12px; border: none; border-radius: 5px; cursor: pointer; }

        @media print {
            .btn-group, .back-btn { display: none !important; }
            .art-paper { box-shadow: none; margin: 0; padding: 20px; }
        }
    </style>
</head>
<body>

    <div class="art-paper" id="paper">
        <img id="decor-t" class="decor-top" src="">
        <img id="decor-b" class="decor-bottom" src="">

        <button onclick="history.back()" class="back-btn">⬅ Dashboard</button>
        <h2 id="paper-title" style="font-family: 'Playfair Display', serif; color: #2d5a27;"></h2>

        <textarea id="story-input" placeholder="Tuliskan jiwamu di sini..."></textarea>

        <div class="action-bar btn-group">
            <button class="btn-pribadi" onclick="alert('Kisah tersimpan di diary pribadi🔒')">Simpan Pribadi</button>
            <button class="btn-publik" onclick="alert('Kisah dipublikasikan! 🌍')">Simpan Publik</button>
            <button class="btn-print" onclick="window.print()">Cetak Kisah (Print) 🖨️</button>
        </div>
    </div>

    <script>
        const tema = localStorage.getItem('temaDipilih');
        document.getElementById('paper-title').innerText = "Lembaran " + tema;

        // Set dekorasi sesuai tema
        if(tema === 'Botanical') {
            document.getElementById('decor-t').src = "https://www.transparentpng.com/download/leaves/green-leaves-png-images-free-download-23.png";
            document.getElementById('paper').style.background = "#f7fff7";
        } else if(tema === 'Celestial') {
            document.getElementById('decor-t').src = "https://www.transparentpng.com/download/star/gold-star-png-3.png";
            document.getElementById('paper').style.background = "#fcfaff";
        } else if(tema === 'Archive') {
            document.getElementById('paper').style.background = "#f4efe1";
        }
    </script>
</body>
</html>
